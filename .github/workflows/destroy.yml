name: 'Destroy Infrastructure'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm deletion of ALL resources'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate confirmation
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
          echo "❌ Confirmation failed. You must type 'destroy' to proceed."
          exit 1
        fi
        echo "✅ Confirmation accepted. Proceeding with destroy..."

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region us-east-1 --name project-bedrock-cluster || true

    - name: Uninstall Helm release (removes ALB to prevent VPC deletion stuck)
      run: |
        helm uninstall my-retail-app -n retail-app --timeout 120s || true
        kubectl delete namespace retail-app --timeout=90s --ignore-not-found || true
        echo "Waiting 60s for ALB to be deregistered by AWS..."
        sleep 60

    - name: Empty S3 asset bucket (required before Terraform can delete it)
      run: |
        BUCKET=$(aws s3 ls --region us-east-1 | grep bedrock-assets | awk '{print $3}' | head -1)
        if [ -n "$BUCKET" ]; then
          echo "Emptying bucket: $BUCKET"
          aws s3 rm s3://$BUCKET --recursive
        else
          echo "No bedrock-assets bucket found, skipping."
        fi

    - name: Terraform Init
      run: terraform init

    - name: Terraform Destroy
      run: terraform destroy -auto-approve
      env:
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
